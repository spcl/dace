# Schema file for DaCe Preferences

# Metadata fields for elements:
#   type: any python type (dict, list, int, bool, float, str)
#   title: short name to show in GUI
#   description: tooltip to show in GUI
#   required: required sub-fields (for dict fields)
#   default: default value. Can be platform-specific (see below)
#   default_<platformname>: default value for platform <platformname> (overrides default)
#   template_vars: template variables to include when processing (str fields only)

# Top-level element is a dictionary (record)
type: dict
title: General
description: DaCe Preferences
required:
    #############################################
    # Categories
    optimizer:
        type: dict
        title: Optimizer
        description: Preferences of the SDFG Optimizer
        required:
            autospecialize:
                type: bool
                default: false
                title: Auto-specialize symbols
                description: >
                    Automatically specialize every SDFG to the symbol values
                    at call-time. Requires all symbols to be set.

            autooptimize:
                type: bool
                default: false
                title: Run auto-optimization heuristics
                description: >
                    Automatically runs the set of optimizing transformation
                    heuristics on any program called via the Python frontend.

            autotile_size:
                type: int
                default: 128
                title: Default tile size in auto-optimization
                description: >
                    Sets the default tile size for the optimization heuristics.

            autotile_partial_parallelism:
                type: bool
                default: true
                title: Prefer partial parallelism over write-conflict tiling
                description: >
                    If true, sets the auto-optimizer to prefer extracting map
                    parallel dimensions over tiling for atomic write-conflict
                    resolution edges. This may be slower in case of small
                    parallel dimensions vs. conflicted dimensions. This
                    preference only applies to symbolic ranges or ranges over
                    the autotile_size parameter.

            visualize_sdfv:
                type: bool
                default: false
                title: Visualize SDFG
                description: Open an SDFG in browser every transformation.

            save_intermediate:
                type: bool
                default: false
                title: Save intermediate SDFGs
                description: Save SDFG files after every transformation.

            automatic_simplification:
                type: bool
                default: true
                title: Automatic SDFG simplification
                description: >
                    Automatically performs SDFG simplification on programs.

            detect_control_flow:
                type: bool
                default: true
                title: Detect control flow from state transitions
                description: >
                    Attempts to infer control flow constructs "if",
                    "for" and "while" from state transitions, allowing
                    code generators to generate appropriate code.

            symbolic_positive:
                type: bool
                default: true
                title: Treat all symbolic expressions as positive
                description: >
                    Every expression in which a symbolic value appears
                    is treated as strictly positive. This is necessary
                    for certain Range evaluations using Subgraph Fusion.

            new_gpu_offloading:
                type: bool
                default: true
                title: Enable new GPU offloading transformation
                description: >
                    Whatever

            match_exception:
                type: bool
                default: false
                title: Treat exceptions in "can_be_applied" as errors
                description: >
                    When an exception is raised in a transformation "can_be_applied"
                    function, if True the exception is raised further. Otherwise
                    the exception is printed as a warning.

            canonicalization:
                type: dict
                title: Canonicalization pipeline defaults
                description: >
                    Default limits for the canonicalization / parallelization loop
                    passes. Each seeds the matching pass Property default (read once
                    at import); an explicit constructor argument still overrides.
                required:
                    unroll_limit:
                        type: int
                        default: 8
                        title: Short-loop unroll limit
                        description: >
                            Fully unroll constant-trip loops with at most this many
                            iterations (0 disables). Seeds ``ShortLoopUnroll.unroll_limit``.

                    peel_limit:
                        type: int
                        default: 8
                        title: Best-effort loop peel limit
                        description: >
                            Bounds the wrapping-modulo peel to 1..peel_limit iterations
                            (0 disables). Seeds ``BestEffortLoopPeeling.peel_limit``.
    compiler:
        type: dict
        title: Compiler
        description: Preferences of the compiler
        required:
            use_cache:
                type: bool
                default: false
                title: Use cache
                description: >
                    If enabled, does not recompile code generated from SDFGs
                    if shared library (.so/.dll) file is present.

            emit_tree_reductions:
                type: bool
                default: true
                title: Emit tree reductions for parallel WCR
                description: >
                    Experimental automated tree-reduction emission for certain WCR patterns.
                    If enabled, a conflict-free (WCR) reduction accumulator written from a
                    parallel map is lowered to a privatize-and-tree-reduce form: on CPU an
                    OpenMP ``reduction(op:var)`` clause on the ``parallel for``, and on GPU a
                    per-thread-block ``cub::BlockReduce`` (one atomic per block). If disabled,
                    the same reduction instead lowers to a plain atomic WCR (one atomic per
                    iteration on CPU / ``atomicAdd`` per thread on GPU) -- correct but
                    contended. Only affects codegen; the SDFG is unchanged either way.

            build_folder_mode:
                type: str
                default: development
                title: Save mode for the build folder
                description: >
                  Selects which content should be saved in the build folder.
                  Two modes are currently supported: `development`, that includes
                  everything; and `production`, that saves only the compiled library
                  and the folder mode file.

            library_prefix:
                type: str
                default: ""
                default_Linux: "lib"
                default_Darwin: "lib"
                title: Library prefix
                description: Filename prefix for shared libraries.

            library_extension:
                type: str
                default: so
                default_Linux: so
                default_Windows: dll
                default_Darwin: dylib
                title: Library extension
                description: File extension of shared libraries.

            indentation_spaces:
                type: int
                default: 4
                title: Indentation width
                description: >
                    Number of spaces used when indenting generated code.

            build_type:
                type: str
                default: Release
                title: Build configuration
                description: >
                    Configuration type for the build (can be Debug, Release,
                    RelWithDebInfo, or MinSizeRel). The build type is the single
                    source of the optimization level -- compiler.cpu.args carries
                    only non-optimization flags -- so Release compiles at -O3,
                    RelWithDebInfo at -O2 -g, Debug at -O0 -g, MinSizeRel at -Os.

            build_mode:
                type: str
                default: cmake
                title: Build system
                description: >
                    How generated code is compiled. "cmake" (default) writes a
                    CMakeLists project and runs cmake configure + build. "native"
                    emits the g++/nvcc/link commands directly and runs them via
                    subprocess, skipping cmake configure overhead. "native" is
                    Linux-only and CUDA-only for GPU (no HIP); it errors clearly on
                    anything it cannot resolve without cmake.

            static_archive:
                type: bool
                default: false
                title: Also emit a static archive
                description: >
                    When true, the build additionally emits ``lib<name>.a`` (the
                    compiled object files archived with ``ar rcs``) next to the
                    runnable ``lib<name>.so``. The ``.so`` is untouched -- the SDFG
                    still loads and runs exactly as before -- so this only ADDS an
                    artifact. Used to link an offloaded loop-nest into a parent
                    SDFG's shared library as a static member instead of a second
                    dlopen. Off by default; supported in both ``native`` and
                    ``cmake`` build modes.

            build_jobs:
                type: int
                default: 4
                title: Parallel compile jobs for the CMake build
                description: >
                    How many source files the CMake build may compile concurrently
                    (passed as ``cmake --build . --parallel <N>``). Applies to
                    ``build_mode: cmake``.

                    Deliberately a SMALL default rather than the core count: builds
                    often share a machine, and each concurrent C++ compile of a
                    generated file can take a lot of memory, so an unbounded build is
                    a good way to run a box out of RAM. Raise it on a machine you own.

                    This is what makes
                    ``compiler.cpu.codegen_params.split_nsdfg_translation_units``
                    pay off: that knob turns one huge translation unit into several,
                    and this one lets them compile at the same time. With the Ninja
                    generator (used automatically when ``ninja`` is on PATH) the bound
                    is also what keeps Ninja from defaulting to every core.

            allow_shadowing:
                type: bool
                default: true
                title: Allow variable shadowing
                description: >
                   Allowing shadowing of variables in the code (reduces
                   exceptions to warnings when shadowing is encountered).

            codegen_lineinfo:
                type: bool
                default: false
                title: Annotate code generator lines
                description: >
                    Keep a source mapping between generated code and the file/line
                    of the code generator that generated it. Used for debugging
                    code generation.

            codegen_state_struct_suffix:
                type: str
                default: "_state_t"
                title: Suffix used by the code generator to mangle the state struct.
                description: >
                    For every SDFG the code generator is is processing a state struct is generated.
                    The typename of this struct is derived by appending this value to the SDFG's name.
                    Note that the suffix may only contains letters, digits and underscores.

            cpp_standard:
                type: str
                default: "20"
                title: C++ standard version
                description: >
                    C++ standard to use for compilation (e.g., 14, 17, 20, 23, 26).

            format_code:
                type: bool
                default: false
                title: Format code with `clang-format`
                description: >
                    Formats the generated code with `clang-format` before saving the files.

            format_config_file:
                type: str
                default: ""
                title: Path to the .clang-format file
                description: >
                    Clang-format file to be used by clang-format, only used if format_code is true

            default_data_types:
                type : str
                default: Python
                title : Default data types
                description: >
                    Specify the default data types to use in generating code.
                    If "Python", Python's semantics will be followed (i.e., `float`  and `int`
                    are represented using 64 bits). If the property is set to "C", C's semantics will be
                    used (`float` and `int` are represented using 32bits).

            unique_functions:
                type: str
                default: hash
                title: Generate unique functions
                description: >
                    Determine if and how to generate the code for equivalent NestedSDFGs:
                    "hash": hashing is used to determine if multiple NestedSDFGs with equivalent contents exist.
                    If this is the case, the code is generated only once.
                    "unique_name": the unique_name property of SDFG is used to determine if two NestedSDFGs are equal,
                    generating the code only once.  This gives more control to the programmer, that can explicitly
                    decide what NestedSDFG code can be replicated and what not.
                    "none": a separate function is code generated for each NestedSDFG

            allow_view_arguments:
                type: bool
                default: false
                title: Allow numpy views as arguments
                description: >
                    If true, allows users to call DaCe programs with NumPy views
                    (for example, "A[:, 1]" or "w.T"). As this can create pointer
                    aliasing issues with two arrays pointing to the same memory,
                    or analyzability issue with strides and alignment, this option
                    is disabled by default.

            inline_sdfgs:
                type: bool
                default: false
                title: Inline all nested SDFGs
                description: >
                    If set to true, inlines all nested SDFGs upon code generation by default.

            max_stack_array_size:
                type: int
                default: 65536
                title: Max stack-allocated array size (bytes)
                description: >
                    All stack allocated arrays (i.e. StorageType.Register) with
                    size larger than this will be allocated on the heap.

            extra_cmake_args:
                type: str
                default: ''
                title: Additional CMake configuration arguments
                description: >
                    If set, specifies additional arguments to the initial invocation
                    of ``cmake``.

            lineinfo:
                type: str
                default: "inspect"
                title: Add line info
                description: >
                    Wether or not to add line info from the parsed code in the
                    generated SDFG. Valid options are `inspect` and `none`.
                    "inspect": During parsing, inspect the python call stack and
                    automatically add line info from the parsed source code in the
                    resulting SDFG.
                    "none": Do not save any line info in the resulting SDFG.

            #############################################
            # CPU compiler
            cpu:
                type: dict
                title: CPU
                description: CPU compiler preferences
                required:
                    executable:
                        type: str
                        default: ''
                        title: Compiler executable override
                        description: File path or name of compiler executable

                    args:
                        type: str
                        title: Arguments
                        description: Compiler argument flags
                        default: '-fPIC -Wall -Wextra -march=native -ffast-math -Wno-unused-parameter -Wno-unused-label'
                        default_Windows: '/O2 /fp:fast /arch:AVX2 /D_USRDLL /D_WINDLL /D__restrict__=__restrict'

                    libs:
                        type: str
                        title: Additional libraries
                        description: Additional linked libraries required by target
                        default: ''

                    openmp_sections:
                        type: bool
                        default: false
                        title: Use OpenMP sections
                        description: >
                            If set to true, multiple connected components will
                            generate "#pragma omp parallel sections" code around
                            them.

                    parallel_transfer_min_elements:
                        type: int
                        default: 1024
                        title: Parallel copy/memset element threshold
                        description: >
                            A contiguous CPU copy or memset (CopyLibraryNode /
                            MemsetLibraryNode) whose element count is a compile-time
                            constant at or above this value expands to an OpenMP element
                            map (parallel across threads at top level); a smaller -- or a
                            symbolic, unknown-at-compile-time -- size expands to a single
                            std::memcpy / std::memset.

                    implementation:
                        type: str
                        default: legacy
                        title: CPU code generator implementation
                        description: >
                            Selects the CPU code generator. ``legacy`` uses the classic
                            connector-based tasklet codegen (copy-in / compute / copy-out
                            blocks). ``experimental_readable`` emits human-readable code: one
                            ``static constexpr``/``consteval`` ``<array>_idx(...)`` index
                            function per array, connector-free tasklets that access arrays
                            directly, and ``const``/``constexpr`` initialization for
                            write-once data. This flag also governs GPU-kernel tasklets,
                            which are emitted through the shared CPU generator instance.

                    codegen_params:
                        type: dict
                        title: CPU codegen parameters
                        description: >
                            Tuning knobs for the CPU code generators. Each names a source-level form
                            that is SEMANTICALLY NEUTRAL but can move backend decisions -- the
                            published mean coefficient of variation across semantically-equivalent
                            loop forms is ~17% for clang ("compiler instability", Gong et al.
                            OOPSLA'18), and the sign of any given knob is target-, compiler- and
                            kernel-dependent. So none of these is hardcoded: every default reproduces
                            the legacy generator's existing output, and each knob exists to be SWEPT
                            and MEASURED per target rather than argued from first principles.

                            EVERY key here MUST state which generator(s) it affects, on an
                            ``Applies to:`` line -- ``legacy``, ``experimental_readable``, or both
                            (see ``compiler.cpu.implementation``). A knob that names only
                            ``experimental_readable`` is a no-op under ``legacy``, whose output stays
                            byte-identical.
                        required:
                            const_scalar_abi:
                                type: str
                                default: by_ref
                                title: Read-only scalar calling convention
                                description: >
                                    Applies to: experimental_readable ONLY (legacy always binds by
                                    reference and ignores this key).

                                    How the readable generator binds a READ-ONLY scalar: ``by_ref``
                                    emits ``const T& x`` (the legacy convention -- forming the
                                    reference never copies), ``by_value`` emits ``const T x`` (a
                                    copy). Semantically identical, and the faster one is NOT fixed:
                                    LLVM #121262 is the same axis with the REFERENCE winning, while
                                    Lemire measured by-reference 4.5x SLOWER on an aliasing-bound
                                    loop. Measured here: on Neoverse-V2 + clang the two forms lower a
                                    masked sum-reduction differently (``ld1w p/z`` + ``sel`` +
                                    unpredicated ``fadd`` vs ``ldr z`` + merging-predicated ``fadd``),
                                    correlating with ~17%. NOTE: Arm's Neoverse-V2 optimization guide
                                    (Table 3-25) lists identical latency/throughput/pipelines for ALL
                                    FADD forms, so that delta is NOT explained by published
                                    instruction costs -- the mechanism is OPEN (a predicate-pipe
                                    dependency in the accumulate chain is the leading candidate) and
                                    code layout has not been excluded. Default ``by_ref`` matches
                                    legacy.
                            index_ctype:
                                type: str
                                default: int64
                                title: Index-function integer type
                                description: >
                                    Applies to: experimental_readable ONLY (legacy inlines its offset
                                    arithmetic instead of emitting ``<array>_idx`` helpers, so it has
                                    no index type to pick and ignores this key).

                                    The integer type the generated ``<array>_idx`` / ``<array>_size``
                                    helpers compute a flat index in: ``int64`` emits ``int64_t`` (the
                                    default), ``int32`` emits ``int32_t``. Both are the exact-width
                                    ``<cstdint>`` types, already in scope via ``dace/dace.h``. The
                                    spelling is deliberate: ``long long`` is only guaranteed to be AT
                                    LEAST 64 bits, so it does not state the width this key names.

                                    UNSAFE ABOVE 2**31: ``int32`` silently WRAPS past 2147483647, and
                                    the bound is on the ELEMENT COUNT, not the byte size -- an int8
                                    array overflows at just 2 GiB of data (float32 at 8 GiB, float64
                                    at 16 GiB). It is therefore never selected automatically: the
                                    generator cannot prove a symbolic shape stays under the bound, and
                                    an overflow here corrupts data with no diagnostic. Set it only for
                                    an SDFG whose extents you know.

                                    Do not expect a win by default. Measured on x86-64 (Zen 4), most
                                    kernels land inside a 0.5-6% noise floor, and the deltas that do
                                    clear it point OPPOSITE ways (gcc/gather -26% for int32, but
                                    clang/stencil +12% against it) -- a knob to sweep, not a default to
                                    flip. It is also NOT an ABI axis: templating or overloading the
                                    helpers on the index type was measured and rejected, because GCC's
                                    identical-code folding collapses the instantiations back onto one
                                    body (``<stencil3d_v3_c32>: jmp <stencil3d_v2_c32>``) while C++
                                    argument deduction silently picks 32-bit math from the generated
                                    ``for (auto i = 0; ...)`` call sites -- an explicit knob cannot do
                                    that behind your back.
                            heap_ptr_restrict:
                                type: str
                                default: restrict
                                title: __restrict__ on heap array pointers
                                description: >
                                    Applies to: experimental_readable ONLY (legacy does not emit the
                                    fused ``T* ptr = alloc`` declaration this qualifies).

                                    Whether a heap-allocated array pointer is declared
                                    ``T* __restrict__ p`` (``restrict``, the default) or ``T* p``
                                    (``none``). ``restrict`` promises the pointer does not alias, which
                                    is what lets the vectorizer prove independence -- the default and
                                    the faster bet. It is NEVER applied to a ``may_alias`` descriptor
                                    regardless of this key: that array is deliberately reachable through
                                    a second pointer, so promising no-alias would be a miscompile, not a
                                    win. The effect is genuinely BIMODAL when it does apply (46 tests
                                    faster / 18 slower in rust#82834; ``!noalias`` has even DISABLED
                                    vectorization via GVN load-PRE in llvm#38583), which is why it is a
                                    knob and not a hardcode. ``restrict`` reproduces today's output.
                            split_nsdfg_translation_units:
                                type: bool
                                default: false
                                title: Emit each top-level nested SDFG as its own translation unit
                                description: >
                                    Applies to: legacy AND experimental_readable.

                                    Split codegen output so that each TOP-LEVEL nested SDFG becomes its
                                    own ``.cpp``. When on, ``OutlineTopLevelNests`` first wraps every
                                    top-level map-nest / loop region of the root SDFG in a ``no_inline``
                                    nested SDFG, and each such nest is emitted to
                                    ``src/cpu/nsdfg/<label>.cpp`` instead of being written into the one
                                    frame ``.cpp``. The frame keeps a forward declaration and the call.

                                    This is a BUILD-PARALLELISM tactic, not a codegen-quality one: one
                                    huge TU is compiled by exactly one core, so a big SDFG serializes
                                    the build. N translation units let the CMake Ninja generator (used
                                    automatically when ``ninja`` is on PATH) compile them concurrently.

                                    The nest function is called across the TU boundary as a normal
                                    IN-BINARY function -- forward-declared, external linkage, and
                                    ``DACE_HIDDEN`` (hidden visibility) so it stays out of the shared
                                    library's public ABI. It is NOT a separate ``.so`` and is NOT
                                    ``dlopen``ed; the static linker resolves the cross-object call.
                                    (Unrelated to ``NestedSDFG.ext_sdfg_path``, which is a runtime lazy
                                    LOADER and does not touch codegen.)

                                    COST: splitting puts the nest body behind a TU boundary, so the
                                    compiler can no longer inline it into the frame or specialize it on
                                    the call site. Recover that with ThinLTO -- add ``-flto=thin`` to
                                    ``compiler.cpu.args`` and to ``compiler.linker.args``, which keeps
                                    the cross-TU inlining while staying parallel and bounded in memory.
                                    NEVER use plain ``-flto`` (monolithic LTO): it merges every TU into
                                    one serial link-time module, which both destroys the parallelism
                                    this knob buys and can exhaust RAM on a small machine. ThinLTO is
                                    strictly OPT-IN and CORRECTNESS DOES NOT DEPEND ON IT -- it only
                                    affects whether the cross-TU call is re-inlined.

                                    Default ``false`` reproduces today's output BYTE-IDENTICALLY for
                                    both generators: every split path is gated on this key, so when it
                                    is off the nest bodies are written inline into the single frame
                                    ``.cpp`` exactly as before.
                            external_translation_units:
                                type: bool
                                default: false
                                title: Emit each top-level GPU nest as its own standalone SDFG + translation unit
                                description: >
                                    Applies to: legacy AND experimental cuda backends.

                                    Model 2 of the per-translation-unit split, for GPU. Where
                                    ``split_nsdfg_translation_units`` relocates a CPU-only nest's function
                                    into its own ``.cpp`` (still one codegen pass, one ``.cu`` for the whole
                                    program), THIS key lifts each top-level nest that contains GPU work into a
                                    STANDALONE SDFG that is code-generated on its OWN -- a separate codegen
                                    pass, hence its OWN ``.cu`` with only that nest's kernels. Both cuda
                                    generators emit exactly one ``.cu`` per generate_code invocation, so one
                                    ``.cu`` per top-level GPU kernel is only reachable this way; it needs no
                                    change to either cuda backend.

                                    The parent calls each child through the child SDFG's PUBLIC extern-C
                                    handle ABI -- ``__dace_init_<child>`` / ``__program_<child>`` /
                                    ``__dace_exit_<child>`` -- forward-declared and resolved in-binary by the
                                    static linker (the same one-``.so`` contract as
                                    ``split_nsdfg_translation_units``; NOT a separate library, NOT
                                    ``dlopen``). Device pointers are passed straight through: parent and
                                    child share the process's CUDA context, so a device allocation is valid
                                    across the call.

                                    DEPTH 1: a child is generated with this key forced off, so a nest inside
                                    a child is not itself lifted again.

                                    Default ``false`` reproduces today's output byte-identically: the lift
                                    and the recursive per-child codegen are both gated on this key.
                            inline_full_array_nsdfg:
                                type: bool
                                default: false
                                title: Inline a full-array nested SDFG as a __restrict__ pointer alias
                                description: >
                                    Applies to: legacy AND experimental_readable.

                                    A nested SDFG (e.g. an outlined map nest) is normally emitted as its own
                                    C++ function that the parent calls with the connector arrays as
                                    arguments. When this key is on, a nested SDFG whose EVERY connector binds
                                    a WHOLE outer array -- full range, offset 0, and the nested array has the
                                    same shape and strides -- is instead emitted INLINE at the call site: no
                                    function, no argument marshaling, just one pointer alias per connector,

                                        T* __restrict__ <connector> = <outer array>;

                                    (and nothing at all when the connector already has the same name as the
                                    outer array). ``__restrict__`` records that the alias does not overlap the
                                    other connectors -- the no-alias hint the function-argument form gets for
                                    free -- so the optimizer keeps vectorizing across the (now inlined) body.

                                    Only whole-array connectors qualify: a sub-range needs offset/stride math,
                                    a scalar is passed by value, and a WCR output must go through the atomic
                                    resolve path -- each of those keeps the function form. Because it inlines,
                                    it shares ``inline_sdfgs``' constraint that a nested transient must not
                                    shadow a name already live in the parent scope.

                                    Default ``false`` keeps the function form, byte-identical to today.
                            index_fn_qualifier:
                                type: str
                                default: inline_constexpr
                                title: Qualifier on generated index/size helpers
                                description: >
                                    Applies to: experimental_readable ONLY (legacy inlines its offset
                                    arithmetic and emits no ``<array>_idx`` / ``<array>_size`` helpers).

                                    The linkage/inlining qualifier on the generated index and size
                                    helpers. ``inline_constexpr`` (the default) emits
                                    ``static DACE_HDFI constexpr`` -- ``inline`` is a hint the backend
                                    already honours for these tiny functions at -O2, so they are inlined
                                    and the access reads as ``p[i*S+j]`` to the vectorizer.
                                    ``always_inline`` additionally attaches
                                    ``__attribute__((always_inline))`` to FORCE inlining regardless of
                                    the inliner's cost model -- useful only where a helper is (wrongly)
                                    left out of line, which pins a vectorization precondition. Inlining
                                    is the precondition for every downstream idiom/vectorization
                                    decision, so leaving these helpers un-inlined is the failure mode
                                    this guards against. ``inline_constexpr`` reproduces today's output.
                            loop_index_type:
                                type: str
                                default: auto
                                title: Map-loop induction variable type
                                description: >
                                    Applies to: legacy AND experimental_readable (both emit map loops
                                    through the same emitter in cpu.py).

                                    The declared type of a map loop's induction variable. ``auto`` (the
                                    default) deduces it from the lower bound -- for the usual ``0`` that
                                    makes it ``int``, i.e. 32-bit index math. ``int64`` emits
                                    ``int64_t`` and ``int32`` emits ``int32_t`` explicitly (the
                                    exact-width ``<cstdint>`` types, in scope via ``dace/dace.h``).

                                    NOTE the ``auto`` default is 32-bit index math for the usual lower
                                    bound of ``0``, so a map over ``0:N`` with N above 2**31 WRAPS. That
                                    is an argument for defaulting to ``int64``, but this key reaches the
                                    SHARED map-loop emitter, so changing its default would change legacy
                                    output for every user, and a wider counter is not free (see below).
                                    It stays ``auto`` until a sweep says otherwise.

                                    Widening the induction variable can let TBAA disprove aliasing so a
                                    store sinks out of the loop, and it changes the no-wrap facts SCEV
                                    and the vectorizer rely on -- but a wider counter is also more
                                    register pressure and, on a 32-bit-safe loop, pure cost. The sign is
                                    not fixed; sweep it. This is DISTINCT from ``index_ctype``, which
                                    types the generated helper bodies, not the loop variable; if the two
                                    disagree the loop index converts at the call. ``auto`` reproduces
                                    today's output byte-for-byte, so legacy is unaffected by default.
                            loop_bound_cmp:
                                type: str
                                default: lt
                                title: Map-loop bound comparison
                                description: >
                                    Applies to: legacy AND experimental_readable (shared map-loop
                                    emitter).

                                    How a map loop's exit test is spelled, for the identical iteration
                                    space: ``lt`` emits ``i < end + 1`` (the default), ``le`` emits
                                    ``i <= end`` (same range, without the ``+ 1`` add), ``ne`` emits
                                    ``i != end + 1``.

                                    ``ne`` supports any stride. A naive ``i != end + 1`` is correct only
                                    when the stride divides the range -- otherwise the counter steps
                                    OVER that bound, never compares equal, and the loop does not
                                    terminate. So for a non-unit stride the bound is normalised to the
                                    first value the counter actually LANDS on at or past the end,
                                    ``begin + int_ceil(end + 1 - begin, skip) * skip``, which it is
                                    guaranteed to hit exactly. Even so, ``ne`` forces the optimizer to
                                    prove termination before it may vectorize or unroll, where ``<``
                                    hands SCEV a trip count directly -- so ``ne`` is the pessimistic end
                                    of this axis and exists to be measured, not recommended. ``lt``
                                    reproduces today's output byte-for-byte.
                            loop_decl_style:
                                type: str
                                default: for_init
                                title: Map-loop induction variable declaration placement
                                description: >
                                    Applies to: legacy AND experimental_readable (shared map-loop
                                    emitter).

                                    Where a map loop's induction variable is declared, for the identical
                                    loop: ``for_init`` (the default) declares it in the for-statement's
                                    init clause, ``for (auto i = 0; ...)``; ``hoisted`` declares it ahead
                                    of the loop, ``auto i = 0; for (; ...)``.

                                    The variable's lifetime is the only difference: hoisted, it outlives
                                    the loop, which is what makes this a style axis at all -- a longer
                                    live range is a different input to register allocation. It also means
                                    two sibling maps sharing a parameter name would collide, so hoisting
                                    forces the map's encapsulating scope to be emitted (that brace is
                                    exactly what bounds a declaration made ahead of the loop headers).

                                    Applies to SEQUENTIAL maps only. An OpenMP pragma must be
                                    immediately followed by a CANONICAL loop whose init clause declares
                                    the induction variable, so hoisting it leaves the pragma facing a
                                    declaration and the compiler rejects it outright ("loop nest
                                    expected"). A CPU_Multicore / CPU_Persistent map therefore keeps
                                    ``for_init`` regardless of this key. ``for_init`` reproduces today's
                                    output byte-for-byte.
                            loop_access_form:
                                type: str
                                default: indexed
                                title: Sequential-loop array access form
                                description: >
                                    Applies to: experimental_readable ONLY (legacy emits no readable
                                    ``<array>_idx`` access path to rewrite, so it ignores this key and
                                    stays byte-identical for every value).

                                    How arrays indexed at the loop counter are accessed inside a
                                    SEQUENTIAL map loop: ``indexed`` (the default) recomputes the flat
                                    index every iteration -- ``C[C_idx(i)] = A[A_idx(i)] + B[B_idx(i)]``;
                                    ``ptr_increment`` walks each such array with a base pointer advanced
                                    by its constant per-iteration stride --
                                    ``T* pC = C; ...; for (...) { *pC = *pA + *pB; pC += 1; pA += 1; }``.
                                    Both cover the identical memory accesses in the identical order.

                                    This is a READABILITY / variant-space form, NOT a speed lever: the
                                    backend canonicalizes the two directions into one (indvars raises a
                                    pointer recurrence to a subscript, LSR lowers a subscript back to a
                                    walking GEP, and x86-64 scaled-index addressing makes the index math
                                    free), so no speedup is claimed or expected -- it exists to emit a
                                    visibly different but equivalent form.

                                    SEQUENTIAL constructs only, and gated exactly as the hoisted
                                    declaration is: an OpenMP (``CPU_Multicore`` / ``CPU_Persistent``)
                                    map keeps the canonical indexed loop the parallel-for pragma requires
                                    (a walking pointer is a loop-carried dependency the parallelism
                                    forbids), so it is unaffected. It is applied only where a simple
                                    pointer walk is provably equivalent -- a single 1-D sequential map
                                    whose one tasklet indexes plain arrays affinely in the loop counter,
                                    with no WCR. Any other shape (a multi-dimensional or mixed-variable
                                    index, an indirect/gather or non-affine subscript, a WCR output, a
                                    non-unit-tasklet scope) falls back to ``indexed`` for that construct
                                    rather than emitting a walk. ``indexed`` reproduces today's output
                                    byte-for-byte.
                            decl_placement:
                                type: str
                                default: eager
                                title: Declaration placement (declare near use)
                                description: >
                                    Applies to: legacy AND experimental_readable for LOOP COUNTERS (the
                                    loop emitter is shared); experimental_readable ONLY for SCALARS
                                    (legacy hoists every scope transient's declaration to its scope top
                                    and ignores this key for them). ``eager`` leaves LEGACY output
                                    byte-identical; for the readable generator it is the default, so it
                                    reproduces today's readable output by definition -- but read the
                                    ``scalar_init_style`` interaction below before assuming that means
                                    the legacy spelling.

                                    Where a declaration is emitted relative to its first use: ``eager``
                                    (the default) declares at the top of its scope, as the legacy
                                    generator does; ``late`` moves each declaration as close to its
                                    first use as it is PROVABLY SOUND to move it.

                                    INTERACTION with ``scalar_init_style``, which is NOT orthogonal for
                                    scalars and cannot be: ``fused`` (that key's default) makes a
                                    scalar's declaration BE its first write, so the declaration is at the
                                    write by construction and there is no separate line for ``eager`` to
                                    hoist. ``decl_placement`` governs only the declarations that remain
                                    separate -- loop counters, and the scalars ``fused`` cannot fold
                                    (a braced first-use tasklet). For those, ``fused`` still emits the
                                    ``T x;`` at first use rather than the scope top, since a candidate it
                                    meant to fold is one it means to declare near its write. So at the
                                    default settings a braced-first-use scalar is NOT declared at its
                                    scope top; set ``scalar_init_style: split`` to get that.

                                    Two constructs are covered, and each has its own soundness gate --
                                    anything that does not
                                    pass its gate keeps the eager declaration, so ``late`` is a
                                    best-effort form, never a promise that nothing is hoisted.

                                    LOOP COUNTERS. A ``LoopRegion`` counter is declared at the top of the
                                    generated function today (``int64_t i;``, then ``for (i = 0; ...)``)
                                    no matter how deep its loop is -- the furthest-from-use declaration
                                    the generator emits. ``late`` declares it in the loop's own for-init
                                    clause instead, ``for (int64_t i = 0; ...)``, which also scopes it
                                    to the loop. Sound only when the counter is genuinely loop-local:
                                    exactly ONE LoopRegion owns the name, the loop is not ``inverted``
                                    (an inverted loop emits its init BEFORE the loop brace, where a
                                    declaration is not loop-scoped), the init statement is a plain
                                    ``i = <expr>``, and NOTHING outside the loop uses the counter -- DaCe
                                    permits a subsequent block to read a counter's final value, which
                                    for-init scoping would break, so it is checked rather than assumed.
                                    Map induction variables are NOT covered here: they already default to
                                    a for-init declaration, and ``loop_decl_style`` is their axis.

                                    SCALARS. A MUTABLE scope-lifetime value scalar (a ``dace.data.Scalar``
                                    transient that is reassigned, so it is not the ``const T x = expr;``
                                    write-once form the ``MarkConstInit`` path already declares at its
                                    definition) is deferred to the line immediately before the first
                                    tasklet that uses it. Sound only for a plain transient value scalar
                                    whose every access lives in ONE scope and is a direct-child tasklet of
                                    that scope, so the deferred declaration lands in the same brace as --
                                    and before -- every use. Any other shape (a write-once const scalar, a
                                    len-1 array, a heap/device/GPU-global scalar, a scalar crossing states
                                    or map/nested-SDFG/copy boundaries, or one used across scopes) stays
                                    eager. NOTE that this gate is narrow enough that most scalars a
                                    front-end emits do not meet it: one inside a map scope, or one live
                                    across states, keeps its eager declaration.

                                    This is a READABILITY / live-range form, not a speed lever -- the
                                    backend sinks a dead declaration to first use regardless.
                            scalar_init_style:
                                type: str
                                default: fused
                                title: Mutable scalar declaration / first-write fusion
                                description: >
                                    Applies to: experimental_readable ONLY (legacy always declares a scope
                                    transient at its scope top, separately from every write, and ignores
                                    this key -- its output stays byte-identical for every value).

                                    Whether a MUTABLE scalar's declaration and its FIRST write are emitted
                                    as one binding: ``split`` emits the legacy pair, ``T x;`` at the scope
                                    top and ``x = expr;`` where the write happens; ``fused`` (the default)
                                    emits ``T x = expr;`` -- the declaration IS the first write.

                                    NOTE this default does NOT reproduce legacy's spelling, unlike the
                                    rest of the group: the readable generator deliberately prefers the
                                    fused binding, since declaring a name at its defining write is the
                                    whole point of a readable form and it shortens the live range. Legacy
                                    is untouched either way -- it ignores this key entirely -- so the
                                    byte-identity rule that governs legacy is not at stake here. Set
                                    ``split`` to recover the legacy pair from the readable generator.

                                    This is the mutable counterpart of the ``const T x = expr;`` binding
                                    that write-once scalars already get from ``MarkConstInit``; a scalar
                                    that is reassigned cannot be ``const``, but its first write can still
                                    define it. Later writes stay plain ``x = expr;``.

                                    Fusion is decided at EMISSION, not predicted: a declaration folded
                                    into a tasklet that turns out to need its own ``{ ... }`` block would
                                    be scoped to that block and invisible to later readers, and whether a
                                    tasklet is emitted brace-free is not known until its body has been
                                    lowered. So a candidate whose first-use tasklet is braced (or whose
                                    statement does not spell the write) falls back to a plain ``T x;``
                                    line immediately ahead of that tasklet rather than being fused. The
                                    declaration is therefore always emitted, exactly once.

                                    Candidates are gated as in ``decl_placement`` (a plain transient value
                                    scalar whose every access is a direct-child tasklet of ONE scope, live
                                    in a single state, never read before it is written), minus ``setzero``
                                    scalars, whose ``T x = 0;`` init already IS a fused declaration.
                            const_init:
                                type: str
                                default: 'on'
                                title: const/constexpr initialization of write-once data
                                description: >
                                    Applies to: experimental_readable ONLY (this runs an SDFG rewrite
                                    inside the readable-generator pipeline in ``codegen.py``; legacy never
                                    enters that block, so its output stays byte-identical for every value).

                                    Whether a transient that is written once and thereafter only read is
                                    classified for ``const``/``constexpr`` emission: ``on`` (the default)
                                    runs :class:`~dace.transformation.passes.mark_const_init.MarkConstInit`;
                                    ``off`` skips it, so every such transient stays a mutable buffer filled
                                    at runtime.

                                    NOTE the default is ``on``, not ``off`` as with ``ssa_loop_scalars``:
                                    this pass ALREADY runs today, so ``on`` is what reproduces today's
                                    output byte-for-byte. The key exists to take it OUT, which is what
                                    makes the readable generator's two const forms separable from the rest
                                    of the group when sweeping -- a compile-time fill (``constexpr T x[N] =
                                    {...}``, promoted to an SDFG constant, its now-dead runtime writes
                                    removed) and a single-runtime-write binding (``const T x = expr;``) are
                                    both suppressed by ``off``.

                                    This is NOT a pure spelling axis, unlike most of this group: a
                                    ``constexpr_static`` fill deletes the initializing writes altogether,
                                    so ``off`` emits strictly more work. It is a knob because ``const`` is
                                    a promise to the backend whose value is not fixed -- it can unlock
                                    constant folding and hoisting, or merely bloat the initializer.

                            explicit_copy:
                                type: str
                                default: 'on'
                                title: Lower implicit copies through explicit CopyLibraryNodes
                                description: >
                                    Applies to: experimental_readable ONLY (this runs an SDFG rewrite
                                    inside the readable-generator pipeline in ``codegen.py``; legacy never
                                    enters that block, so its output stays byte-identical for every value).

                                    Whether an implicit copy is lifted to an explicit
                                    :class:`~dace.libraries.standard.nodes.copy_node.CopyLibraryNode`
                                    before emission: ``on`` (the default) runs
                                    :class:`~dace.transformation.passes.insert_explicit_copies.InsertExplicitCopies`
                                    and then expands the nodes it inserted; ``off`` leaves every copy to the
                                    generator's implicit path.

                                    WHY IT IS ON. The implicit path emits the ``dace::CopyND`` template for
                                    the general case. Going through the library node lets ``ExpandAuto``
                                    pick per copy instead: a single-element copy becomes a plain ``=``
                                    tasklet and a contiguous same-layout multi-element copy becomes
                                    ``std::memcpy`` -- both faster than instantiating ``dace::CopyND``, and
                                    the readable generator then inlines the ``=`` tasklet's connectors like
                                    any other. Only a GPU_Shared copy still needs ``dace::CopyND``.

                                    NOTE this default DEVIATES from the rule the rest of this group follows,
                                    that a new key's default reproduces today's output: the pass does NOT
                                    run in ``codegen.py`` today, so ``on`` deliberately CHANGES the readable
                                    generator's output. That is the point of the key, and it is safe to do
                                    here because the deviation is bounded by the ``Applies to`` line above --
                                    the absolute invariant is that LEGACY stays byte-identical, and gating
                                    this inside the readable-only block keeps it so for both values. Set
                                    ``off`` to recover the readable generator's previous copy lowering.

                                    The pass itself is shared, and its other callers
                                    (``transformation/layout/prepare.py``, the GPU-specialization pipeline)
                                    need the ``CopyLibraryNode`` LEFT UNEXPANDED -- ``RewriteCopyForLayout``
                                    rewrites it to a ``TensorTranspose``. So the expansion belongs to this
                                    key's block in ``codegen.py``, not to the pass.

                            ssa_loop_scalars:
                                type: str
                                default: 'off'
                                title: Single-assignment versioning of reassigned scope scalars
                                description: >
                                    Applies to: experimental_readable ONLY (this runs an SDFG rewrite
                                    inside the readable-generator pipeline in ``codegen.py``; legacy never
                                    enters that block, so its output stays byte-identical for every value).

                                    Whether a transient scalar that is REASSIGNED several times in a scope
                                    / loop nest is versioned into single-assignment names before codegen:
                                    ``off`` (the default) leaves it as one mutable variable; ``on`` runs
                                    the existing :class:`~dace.transformation.passes.scalar_fission.
                                    PrivatizeScalars` (``ScalarFission``) pass so each dominating write
                                    becomes its own container (``nx``, ``nx_0``, ``nx_1`` ...), each
                                    written exactly once. A single-assignment version is then a write-once
                                    value, which ``MarkConstInit`` marks and the generator emits as
                                    ``const T nx_0 = expr;`` -- shorter live ranges and a ``const`` per
                                    version. This is a semantics-preserving SSA renaming (the same pass
                                    ``simplify`` uses to unblock ``LoopToMap``), applied here purely for
                                    the readable form; ``off`` reproduces today's output byte-for-byte.

                            scalar_emission_type:
                                type: str
                                default: keep
                                title: Normalize single-value transients to Scalar or length-1 Array
                                description: >
                                    Applies to: experimental_readable ONLY (this runs an SDFG rewrite
                                    inside the readable-generator pipeline in ``codegen.py``; legacy never
                                    enters that block, so its output stays byte-identical for every value).

                                    Which C++ form a single-value TRANSIENT is emitted in: a by-value
                                    ``Scalar`` (``T x;``) or a length-1 ``Array`` (``T x[1];``, indexed
                                    ``x[0]``). A frontend leaves a mix of both; this normalizes it.

                                    ``keep`` (the default) runs neither conversion, so the descriptors and
                                    the emitted code are byte-identical to today. ``scalar`` runs
                                    :class:`~dace.transformation.passes.length_one_array_scalar_conversion.
                                    ConvertLengthOneArraysToScalars` to turn every length-1 array into a
                                    Scalar; ``len1_array`` runs the inverse
                                    :class:`~dace.transformation.passes.length_one_array_scalar_conversion.
                                    ConvertScalarsToLengthOneArrays`.

                                    BOTH conversions are ``transient_only`` -- a non-transient descriptor is
                                    part of the SDFG signature (the caller binds a Python scalar to a
                                    ``Scalar`` and a 1-element buffer to an ``Array``), so rewriting it would
                                    change the call contract. The signature is therefore never touched.

                                    ``scalar`` additionally CHAINS
                                    :class:`~dace.transformation.passes.promote_gpu_scalars_to_arrays.
                                    PromoteGPUScalarsToArrays` after the scalarization: a GPU kernel output
                                    (a length-1 array in GPU_Global storage, or one written by a device
                                    map's exit) is scalarized by the first pass but immediately widened back
                                    to a length-1 array by the second, because a by-value Scalar cannot live
                                    in device global memory. So GPU kernel outputs stay length-1 arrays under
                                    every value of this key; only host-side transients become Scalars.

            #############################################
            # GPU (CUDA/HIP) compiler
            cuda:
                type: dict
                title: GPU
                description: GPU (CUDA/HIP) compiler preferences
                required:
                    backend:
                        type: str
                        default: 'auto'
                        title: Compilation backend
                        description: >
                            Backend to compile for ('auto' for automatic detection, 'cuda' for NVIDIA, or 'hip' for AMD).

                    path:
                        type: str
                        default: ''
                        title: CUDA/HIP path override
                        description: Path to CUDA toolkit or ROCm/HIP root directory

                    args:
                        type: str
                        title: nvcc Arguments
                        description: Compiler argument flags for CUDA
                        default: '-lineinfo -Xcompiler -march=native --use_fast_math -Xcompiler -Wno-unused-parameter'
                        default_Windows: '-O3 --use_fast_math'

                    hip_args:
                        type: str
                        title: hipcc Arguments
                        description: Compiler argument flags for HIP
                        default: '-fPIC -O3 -ffast-math -Wno-unused-parameter'

                    cuda_arch:
                        type: str
                        title: Additional CUDA architectures
                        description: >
                            Additional CUDA architectures (separated by commas)
                            to compile GPU code for, excluding the current
                            architecture on the compiling machine.
                        default: '60'

                    hip_arch:
                        type: str
                        title: Additional HIP architectures
                        description: >
                            Additional HIP architectures (separated by commas)
                            to compile GPU code for, excluding the current
                            architecture on the compiling machine.
                        default: 'gfx906'

                    default_block_size:
                        type: str
                        title: Default thread-block size
                        description: >
                            Default thread-block size for GPU kernels when
                            explicit GPU block maps are not defined.
                            Can be set to 'max' to maximize occupancy.
                        default: '128,1,1'

                    dynamic_map_block_size:
                        type: str
                        title: Thread-Block size for GPU_ThreadBlock_Dynamic
                        description: >
                            Thread-Block size for maps using GPU_ThreadBlock_Dynamic
                            scheduler. Can be set to 'max' to maximize occupancy.
                        default: '128,1,1'

                    dynamic_map_fine_grained:
                        type: bool
                        title: Enable fine grained load balancing for GPU_ThreadBlock_Dynamic
                        description: >
                            If true the scheduler will dynamically redistribute the
                            combined work of all threads in the warp equally across the
                            warp (fine grained). Otherwise, each warp works sequentially
                            only on its tasks (potential load imbalance).
                        default: true

                    persistent_map_SM_fraction:
                        type: float
                        title: Fraction of SMs to use for persistent GPU map
                        description: >
                            Sets the fraction of the number of SMs of the Device
                            that the GPU_Persistent map can use. Together with
                            persistent_map_occupancy this specifies the grid
                            size of the kernel being launched.
                            0.0 < persistent_map_SM_fraction <= 1.0
                            The fraction will be rounded up to the next integer
                            number of SMs. The max value of SMs that can/will
                            be used is equal to cudaDevAttrMultiProcessorCount.
                        default: 1.0

                    persistent_map_occupancy:
                        type: int
                        title: Number of blocks to launch per SM used
                        description: >
                            Sets the number of thread block to be launched per
                            SM being used. Essentially this is a simple
                            multiplier to persistent_map_SM_fraction.
                            It is up to the user to check if the resulting
                            number of thread blocks can run efficiently on the
                            GPU.
                        default: 2

                    max_concurrent_streams:
                        type: int
                        title: Concurrent execution streams
                        description: >
                            Maximum number of concurrent CUDA/HIP streams to
                            generate. Special values: -1 only uses the
                            default stream, 0 uses infinite concurrent streams.
                        default: 0

                    syncdebug:
                        type: bool
                        title: Synchronous Debugging
                        description: >
                            Enables Synchronous Debugging mode, where each library call
                            is followed by full-device synchronization and error checking.
                        default: false

                    libs:
                        type: str
                        title: Additional libraries
                        description: Additional linked libraries required by target
                        default: ''

                    mempool_release_threshold:
                        type: int
                        title: Memory pool memory release threshold
                        default: -1
                        description: >
                            A value that determines how large a memory allocation has to be before it is
                            automatically released from the memory pool to the system. The default is -1,
                            which indicates "never release". Other values may be 0 (always release), or
                            any byte value.
                            For more information, see ``cudaMemPoolAttrReleaseThreshold`` in the CUDA toolkit
                            documentation.

                    block_size_limit:
                        type: int
                        title: Maximum thread-block size in code generation
                        default: 1024
                        description: >
                            Threshold for the GPU code generator to fail in generating a kernel with
                            a specified overall larger block size. Default value is derived from hardware
                            limits on common GPUs.

                    block_size_lastdim_limit:
                        type: int
                        title: Maximum last dimension thread-block size in code generation
                        default: 64
                        description: >
                            Threshold for the GPU code generator to fail in generating a kernel with
                            a specified larger block size in the third dimension. Default value is
                            derived from hardware limits on common GPUs.

                    thread_id_type:
                        type: str
                        title: Thread/block index data type
                        default: int32
                        description: >
                            Defines the data type for a thread and block index in the generated code.
                            The type is based on the type-classes in ``dace.dtypes``. For example,
                            ``uint64`` is equivalent to ``dace.uint64``. Change this setting when large
                            index types are needed to address memory offsets that are beyond the 32-bit
                            range, or to reduce memory usage.

                    # New configs, needed for ExperimentalCUDACodeGen
                    implementation:
                        type: str
                        title: CUDA codegen implementation
                        description: >
                            Choose between available CUDA code generation implementations.
                            "legacy" is the stable implementation; "experimental" is a
                            work-in-progress rewrite (ExperimentalCUDACodeGen).
                        enum: [legacy, experimental]
                        default: experimental

                    allow_implicit_memlet_to_map:
                        type: bool
                        title: Allow the implicit conversion of Memlets to Maps during code generation.
                        default: true
                        description: >
                            If ``true`` the code generator will implicitly convert Memlets that cannot be
                            represented by a native library call, such as ``cudaMemcpy()`` into Maps that
                            explicitly copy the data around. If this value is ``false`` the code generator
                            will raise an exception if such a Memlet is encountered. This allows the user
                            to have full control over all Maps in the SDFG.

                    gpu_index_type:
                        type: str
                        title: Thread/block/warp index data type
                        default: int32
                        description: >
                            Defines the data type for a thread, block and warp index in the generated code.
                            The type is based on the type-classes in ``dace.dtypes``. For example,
                            ``uint64`` is equivalent to ``dace.uint64``. Change this setting when large
                            index types are needed to address memory offsets that are beyond the 32-bit
                            range, or to reduce memory usage. This replaces ``thread_id_type`` in
                            ``ExperimentalCUDACodeGen`` , as the new name more accurately reflects its broader
                            usage.

                    cuda_warp_size:
                        type: int
                        title: CUDA warp size
                        description: >
                            Defines the warp size used during CUDA code generation. The default and current
                            standard value for CUDA is 32. This should only be changed if future CUDA
                            architectures explicitly alter the warp size. Modifying this value arbitrarily may
                            result in incorrect or unknown behavior, and is therefore strongly discouraged.
                        default: 32

                    hip_warp_size:
                        type: int
                        title: HIP warp size
                        description: >
                            Specifies the warp size (also known as wavefront size) for HIP code generation.
                            The default value for AMD GPUs is typically 64. This setting should only be modified
                            if you have a clear understanding of what you are doing.
                        default: 64

                    auto_syncthreads_insertion:
                        type: bool
                        title: Insert Default __syncthreads() Tasklets
                        description: >
                            If enabled, inserts default __syncthreads() tasklets during preprocessing
                            in ExperimentalCUDACodeGen to ensure shared memory is ready before access.
                            This is a simple safeguard for correctness - it may not be complete, but it
                            does the job for basic SDFGs. Disable if you handle synchronization manually
                            or use other mechanisms like async copies or pipelines.
                        default: true

                    synchronize_on_exit:
                        type: bool
                        title: Synchronize GPU stream at SDFG exit
                        description: >
                            If enabled (default), AutoSingleStreamGPUScheduler appends a
                            cudaStreamSynchronize at every GPU sink state, making each GPU SDFG
                            synchronous on return. Disable only when the host application shares one
                            GPU stream across all SDFG calls (so GPU->GPU hand-off is stream-ordered)
                            and synchronizes at its own host-read boundaries -- this removes the
                            per-SDFG host stall for GPU-resident pipelines (e.g. icon4py), which is
                            the dominant cost on launch-bound stencils. Sink states that write
                            host-visible (CPU) outputs are ALWAYS synchronized regardless of this
                            setting, so numpy / copy-out SDFGs stay correct.
                        default: true

                    gpu_stream_name:
                        type: str
                        title: Name for the GPU stream object
                        description: >
                            GPU streams allow GPU operations, such as kernel execution or memory transfers, to run asynchronously
                            and in parallel. This field specifies the naming convention for the GPU stream array and its connectors
                            in the SDFG. For example: 'gpu_streams,gpu_stream' means 'gpu_streams' is the array containing the
                            stream objects, and 'gpu_stream0' (prefix derived from the second name + stream id) is used as a
                            connector for gpu_streams[0].
                        default: gpu_streams,gpu_stream

            #############################################
            # MPI compiler
            mpi:
                type: dict
                title: MPI
                description: MPI compiler preferences
                required:
                    executable:
                        type: str
                        default: ''
                        title: Compiler executable override
                        description: File path or name of compiler executable

            #############################################
            # Linker
            linker:
                type: dict
                title: Linker
                description: Linker preferences
                required:
                    executable:
                        type: str
                        default: ''
                        title: Linker executable override
                        description: File path or name of linker executable

                    args:
                        type: str
                        title: Arguments
                        description: Linker argument flags
                        default: ''
                        default_Darwin: ''
                        default_Windows: ''

    instrumentation:
        type: dict
        title: Instrumentation
        description: Instrumentation preferences
        required:
            report_each_invocation:
                type: bool
                title: Save report for each invocation
                default: true
                description: >
                    Save an instrumentation report file for each invocation of
                    the SDFG, rather than one report that spans from SDFG
                    initialization to finalization.

            papi:
                type: dict
                title: PAPI
                description: PAPI configuration
                required:
                    default_counters:
                        type: str
                        title: Default PAPI counters
                        default: "['PAPI_TOT_INS', 'PAPI_TOT_CYC', 'PAPI_L2_TCM', 'PAPI_L3_TCM']"
                        description: >
                            Sets the default PAPI counter list, formatted as
                            a Python list of strings.
                    overhead_compensation:
                        type: bool
                        title: Compensate Overhead
                        default: true
                        description: >
                            Subtracts the minimum measured overhead from every measurement.
                    vectorization_analysis:
                        type: bool
                        title: Enable vectorization check
                        default: false
                        description: >
                            Enables analysis of gcc vectorization information. Only gcc/g++ is supported.

    #############################################
    # Python frontend settings

    frontend:
        type: dict
        title: Frontend
        description: Python frontend preferences
        required:
            cache_size:
                type: int
                title: Program cache size
                default: 32
                description: >
                    The number of compiled programs to cache (based on argument
                    types, closure constants, and closure array types) to avoid
                    reparsing/compiling when calling a @dace.program or method.

            implicit_recursion_depth:
                type: int
                title: Auto-parsing recursion depth
                default: 64
                description: >
                    The maximum call-stack depth allowed when automatically
                    parsing called dace functions or methods.

            raise_nested_parsing_errors:
                type: bool
                title: Raise nested parsing errors
                default: false
                description: >
                    Raise all errors out of nested function parsing contexts
                    instead of trying to create a callback implicitly.

            verbose_errors:
                type: bool
                title: Show preprocessed AST on parsing errors
                default: false
                description: >
                    Prints out the preprocessed unparsed AST in case of a parsing
                    error.

            preprocessing_passes:
                type: int
                title: Number of preprocessing passes on Python code
                default: 5
                description: >
                    Number of times to run the Python preprocessing passes (e.g., constant
                    folding) on the input code. Set to zero to disable preprocessing
                    optimizations, set to -1 to run until the code has not changed.

            dont_fuse_callbacks:
                type: bool
                title: Do not fuse callbacks
                default: false
                description: >
                    Stricter mode of operation where callbacks into Python don't participate
                    in state fusion transformations.

            typed_callbacks_only:
                type: bool
                title: Only allow typed callbacks
                default: false
                description: >
                    Stricter mode of operation where callbacks into Python must have explicit return value
                    types in order to compile.

            unroll_threshold:
                type: int
                title: Automatic unroll loop size threshold
                default: -1
                description: >
                    Threshold for automatic loop unrolling of any generator (e.g., including ``range``) with a
                    compile-time size. A value of -1 (default) means not to unroll any loop automatically, a value of
                    0 means unrolling every loop, and a value above zero sets a size threshold beyond which a
                    constant-sized loop will not be automatically unrolled.

            check_args:
                type: bool
                default: false
                title: Check arguments on SDFG call
                description: >
                    Perform an early type check on arguments passed to an SDFG when called directly (from
                    ``SDFG.__call__``). Another type check is performed when calling compiled SDFGs.

            avoid_wcr:
                type: bool
                default: false
                title: Avoid using WCR for augmented assignments when possible
                description: >
                    Perform a map-symbol-dependency check on the write-subsets of augmented
                    assignments that appear inside Maps to avoid using WCR when possible.
                    This feature works correctly only when there is a single augmented assignment
                    for each data dimension inside a Map.

    #############################################

    # General settings

    debugprint:
        type: bool
        default: false
        title: Debug printing
        description: Enable verbose printouts.

    progress:
        type: bool
        default: true
        title: Progress reports
        description: Enable progress report printouts.

    cache:
        type: str
        default: name
        title: Compiled cache entry naming policy
        description: >
            Determine the name of the generated ``.dacecache`` folder:


            * ``name`` uses the name of the SDFG directly, causing it to be
            overridden by other programs using the same SDFG name.

            * ``hash`` uses a mangled name based on the hash of the SDFG, such that
            any change to the SDFG will generate a different cache folder.

            * ``unique`` uses a name based on the currently running Python process
            at code generation time, such that no caching or clashes can happen
            between different processes or subsequent invocations of Python.

            * ``single`` uses a single cache folder for all SDFGs, saving space and
            potentially build time, but disallows executing SDFGs in parallel
            and caching of more than one simultaneous SDFG.

    store_history:
        type: bool
        default: true
        title: Store SDFG transformation history
        description: Store the history of transformations on the SDFG file.

    default_build_folder:
        type: str
        default: .dacecache
        title: Default SDFG build folder
        description: >
            Default folder in which compiled DaCe programs and SDFGs are stored.
            Can either be a relative path (by default) or absolute.

    profiling:
        type: bool
        default: false
        title: Profiling
        description: Enable profiling support.

    profiling_status:
        type: bool
        default: true
        title: Status bar for profiling
        description: >
            Enable tqdm status bar while profiling. If tqdm is not installed
            a warning will appear. To disable this feature (and the warning) set
            this option to false.

    treps:
        type: int
        default: 100
        title: Profiling Repetitions
        description: Number of times to run program for profiling.

    call_hooks:
        type: str
        default: ""
        title: Hooks before/after every DaCe program call
        description: >
            A comma-separated list of functions (or Context Manager classes) that will
            be called before every DaCe program (SDFG) is compiled and run. Used for
            functionality such as automatic tuning or instrumentation.

    compiled_sdfg_call_hooks:
        type: str
        default: ""
        title: Hooks before/after every compiled SDFG call
        description: >
            A comma-separated list of functions (or Context Manager classes) that will
            be called before every compiled SDFG's generated code is invoked. Used
            for functionality such as low-level profiling.

    external_transformations_path:
        type: str
        default: '$HOME/dace_transformations/external_transformations'
        default_Windows: '%USERPROFILE%\\dace_transformations\\external_transformations'
        title: External transformations path
        description: >
            Path to a directory containing external transformations that are not
            included in the main DaCe package. This path is added to the Python path
            and can be used to import custom transformation modules.

    #############################################
    # Experimental features

    experimental:
        type: dict
        title: Experimental
        description: Experimental features
        required:
            validate_undefs:
                type: bool
                default: false
                title: Undefined Symbol Check
                description: >
                    Check for undefined symbols in memlets during SDFG validation.

            check_race_conditions:
                type: bool
                default: false
                title: Check race conditions
                description: >
                    Check for potential race conditions during validation.

    #############################################
    # Features for unit testing

    testing:
        type: dict
        title: Testing
        description: Unit testing settings
        required:
            serialization:
                type: bool
                default: false
                title: Test Serialization on validation
                description: >
                    Before generating code, verify that a serialization/deserialization loop
                    generates the same SDFG.

            deserialize_exception:
                type: bool
                default: false
                title: Treat exceptions in deserialization as errors
                description: >
                    When an exception is raised in a deserialization process (e.g., due to missing library node),
                    by default a warning is issued. If this setting is True, the exception will be raised as-is.

            serialize_all_fields:
                type: bool
                default: false
                title: Serialize all unmodified fields in SDFG files
                description: >
                    If False (default), saving an SDFG keeps only the modified non-default properties. If True,
                    saves all fields.

    #############################################
    # DaCe library settings

    library:
        type: dict
        title: Library
        description: Settings for handling the use of DaCe libraries.
        required:
            blas:
                type: dict
                title: BLAS
                description: Built-in BLAS DaCe library.
                required:
                    default_implementation:
                        type: str
                        default: pure
                        title: Default implementation
                        description: Default implementation for BLAS library nodes.

                    override:
                        type: bool
                        default: false
                        title: Force configured implementation
                        description: >
                            Force the default implementation, even if an
                            implementation has been explicitly set on a node.

            lapack:
                type: dict
                title: LAPACK
                description: Built-in LAPACK DaCe library.
                required:
                    default_implementation:
                        type: str
                        default: OpenBLAS
                        title: Default implementation
                        description: Default implementation for LAPACK library nodes.

                    override:
                        type: bool
                        default: false
                        title: Force configured implementation
                        description: >
                            Force the default implementation, even if an
                            implementation has been explicitly set on a node.
            linalg:
                type: dict
                title: linalg
                description: Built-in NumPy linalg DaCe library.
                required:
                    default_implementation:
                        type: str
                        default: OpenBLAS
                        title: Default implementation
                        description: Default implementation for linalg library nodes.

                    override:
                        type: bool
                        default: false
                        title: Force configured implementation
                        description: >
                            Force the default implementation, even if an
                            implementation has been explicitly set on a node.
            pblas:
                type: dict
                title: PBLAS
                description: Built-in PBLAS DaCe library.
                required:
                    default_implementation:
                        type: str
                        default: MKLMPICH
                        title: Default implementation
                        description: Default implementation PBLAS library nodes.
                    override:
                        type: bool
                        default: false
                        title: Force configured implementation
                        description: >
                            Force the default implementation, even if an
                            implementation has been explicitly set on a node.
