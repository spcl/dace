# .github/workflows/release-please.yml
#
# Two modes:
#   1. on push to `main` — runs release-please to open/update the Release
#      PR, then ensures it carries the `no-ci` label so CI does NOT run
#      on every update (saves minutes on every weekday merge).
#   2. on cron (Thu 14:00 Europe/Zurich ≈ 12:00 UTC) — removes `no-ci`
#      from the open Release PR (which fires all CI workflows via their
#      `pull_request: unlabeled` trigger) and enqueues `--auto --squash`.
#      GitHub merges the PR as soon as every required check is green.
#      The merge creates the tag + GitHub Release, which fires
#      pypi-publish.yml.

name: Release Please

on:
  push:
    branches: [main]
  schedule:
    # GitHub cron is UTC-only. 12:00 UTC = 14:00 CEST (summer, ~7 months/yr).
    # In CET (winter DST) this fires at 13:00 local — accept the 1h drift
    # rather than add a second cron that would double-fire near DST flips.
    - cron: '0 12 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5  # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Ensure Release PR is labelled `no-ci`
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                --label "autorelease: pending" --state open \
                --json number --jq '.[0].number // empty')
          if [[ -n "$PR" ]]; then
            gh pr edit "$PR" --repo "$GITHUB_REPOSITORY" --add-label no-ci
          fi

  auto-merge-thursday:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Unlabel + enqueue auto-merge on open Release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                --label "autorelease: pending" --state open \
                --json number --jq '.[0].number // empty')
          if [[ -z "$PR" ]]; then
            echo "No open Release PR — nothing merged since last release."
            exit 0
          fi
          echo "Removing no-ci from Release PR #$PR — CI will fire via pull_request: unlabeled."
          gh pr edit "$PR" --repo "$GITHUB_REPOSITORY" --remove-label no-ci
          echo "Enqueuing auto-merge."
          gh pr merge "$PR" --auto --squash --repo "$GITHUB_REPOSITORY"
