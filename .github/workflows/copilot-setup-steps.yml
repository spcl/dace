name: "Copilot Setup Steps"
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up C++ compiler
        run: |
          sudo apt-get update
          # g++-aarch64-linux-gnu enables the NEON/SVE -fsyntax-only intrinsic-header
          # tests (tests/passes/vectorization/intrinsics/test_horizontal_reduce_header.py)
          # to run instead of skip in the agent environment.
          sudo apt-get install -y g++ build-essential g++-aarch64-linux-gnu

      - name: Set up CMake
        run: |
          sudo apt-get install -y cmake

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install additional testing dependencies
          python -m pip install pytest pytest-cov
          python -m pip install flake8 pytest-xdist coverage

      - name: Install DaCe in development mode
        run: |
          python -m pip install --editable ".[testing,linting,ml]"
          pre-commit install
          pre-commit run
